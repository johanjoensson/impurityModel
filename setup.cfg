[mypy]
namespace_packages = True
allow_redefinition = True
# Remove ignore_missing_imports if possible.
[mypy-matplotlib.*]
ignore_missing_imports = True
[mypy-h5py.*]
ignore_missing_imports = True
[mypy-scipy.*]
ignore_missing_imports = True
[mypy-mpi4py.*]
ignore_missing_imports = True
[mypy-sympy.*]
ignore_missing_imports = True
# Compiled Cython/C++ extension modules ship no type stubs or py.typed marker, so
# mypy cannot analyze them. Treat them like the third-party libraries above.
[mypy-impurityModel.ed.BiCGSTAB,impurityModel.ed.BlockLanczos,impurityModel.ed.BlockLanczosArray,impurityModel.ed.ChebyshevFilter,impurityModel.ed.GMRES,impurityModel.ed.ManyBodyUtils]
ignore_missing_imports = True
