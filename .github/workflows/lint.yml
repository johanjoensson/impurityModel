name: Lint

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Match [tool.black] target-version = py311 so CI formatting is
          # deterministic and Black's AST safety check can parse the output.
          python-version: "3.11"
      # Runs `pre-commit run --all-files`, i.e. the exact hooks in
      # .pre-commit-config.yaml (Black + cython-lint). If any file isn't
      # formatted, Black reformats it and the job fails with the diff.
      - uses: pre-commit/action@v3.0.1
