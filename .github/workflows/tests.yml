name: Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc-9, clang-11, gcc-12, clang-15, intel]
        cxx_std: ["-std=c++17", "-std=c++20", "-std=c++23"]
        boost: ["-DBOOST", ""]
        parallel: ["-DPARALLEL", ""]
        exclude:
          - compiler: gcc-9
            cxx_std: "-std=c++20"
          - compiler: gcc-9
            cxx_std: "-std=c++23"
          - compiler: clang-11
            cxx_std: "-std=c++20"
          - compiler: clang-11
            cxx_std: "-std=c++23"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mpich libmpich-dev libtbb-dev
          COMPILER="${{ matrix.compiler }}"
          if [[ "$COMPILER" == gcc-* ]]; then
            VERSION=${COMPILER#gcc-}
            sudo apt-get install -y g++-$VERSION
          elif [[ "$COMPILER" == clang-* ]]; then
            VERSION=${COMPILER#clang-}
            sudo apt-get install -y clang-$VERSION
          fi

      - name: Install Intel Compiler
        if: matrix.compiler == 'intel'
        run: |
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-compiler-dpcpp-cpp

      - name: Install Boost
        uses: MarkusJx/install-boost@v2.4.5
        id: install-boost
        with:
          boost_version: 1.83.0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mpi4py pytest pytest-mpi cython setuptools build

      - name: Build and install impurityModel
        run: |
          COMPILER="${{ matrix.compiler }}"
          if [[ "$COMPILER" == gcc-* ]]; then
            export CXX="g++-${COMPILER#gcc-}"
          elif [[ "$COMPILER" == clang-* ]]; then
            export CXX="clang++-${COMPILER#clang-}"
          elif [ "${{ matrix.compiler }}" = "intel" ]; then
            source /opt/intel/oneapi/setvars.sh
            export CXX="icpx"
            echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> $GITHUB_ENV
            echo "PATH=$PATH" >> $GITHUB_ENV
          fi

          export CXXFLAGS="${{ matrix.cxx_std }} ${{ matrix.boost }} ${{ matrix.parallel }}"
          if [ "${{ matrix.parallel }}" = "-DPARALLEL" ]; then
            export CXXFLAGS="$CXXFLAGS -ltbb"
          fi
          if [ "${{ matrix.boost }}" = "-DBOOST" ]; then
            export CXXFLAGS="$CXXFLAGS -I${BOOST_ROOT}/include"
          fi

          pip install -e .

      - name: Run serial tests
        run: |
          pytest

      - name: Run MPI tests (1 rank)
        run: |
          mpiexec -n 1 python -m pytest --with-mpi

      - name: Run MPI tests (2 ranks)
        run: |
          mpiexec -n 2 python -m pytest --with-mpi
