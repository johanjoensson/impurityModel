[pytest]
testpaths = src/impurityModel

# Test test_comparison_with_reference.py in a separate pytest call since it starts MPI processes in a subprocess.run, and
# MPI can't handle that both the parent and the child process use MPI.
# `-m "not benchmark"` keeps performance benchmarks out of standard/CI runs; run them
# explicitly with `pytest -m benchmark` (a command-line -m overrides this default).
addopts = --ignore src/impurityModel/test/test_comparison_with_reference.py --ignore src/impurityModel/test/ac_test.py -m "not benchmark"

filterwarnings =
    error
    # pytest's own _pytest.pathlib.find_prefixed leaves an os.scandir iterator
    # unclosed; under our forced gc.collect() teardown it is finalized at a
    # nondeterministic time, intermittently turning this ResourceWarning into a
    # hard error even though every test passed. Scope the ignore to this exact
    # message so all other ResourceWarnings remain errors.
    ignore:unclosed scandir iterator:ResourceWarning
markers =
    mpi: marker for MPI tests
    benchmark: performance/timing benchmark; skipped by default, run with -m benchmark

