name: Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # Lean, reliable matrix: only compilers that are available on the
        # ubuntu-22.04 runner (gcc-12, clang-15) plus the Intel oneAPI compiler.
        # The `parallel` jobs exercise the threaded ManyBodyOperator::apply path;
        # the `coverage` job is the single canonical run uploaded to Coveralls.
        include:
          - { compiler: gcc-12,   cxx_std: "-std=c++17", parallel: false }
          - { compiler: gcc-12,   cxx_std: "-std=c++20", parallel: false, coverage: true }
          - { compiler: gcc-12,   cxx_std: "-std=c++2b", parallel: false }
          - { compiler: gcc-12,   cxx_std: "-std=c++20", parallel: true }
          - { compiler: clang-15, cxx_std: "-std=c++17", parallel: false }
          - { compiler: clang-15, cxx_std: "-std=c++20", parallel: false }
          - { compiler: intel,    cxx_std: "-std=c++17", parallel: false }
          - { compiler: intel,    cxx_std: "-std=c++20", parallel: false }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history + tags so setuptools-scm can derive the real version
          # instead of falling back to 0.0.0.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mpich libmpich-dev
          COMPILER="${{ matrix.compiler }}"
          if [[ "$COMPILER" == gcc-* ]]; then
            sudo apt-get install -y "g++-${COMPILER#gcc-}"
          elif [[ "$COMPILER" == clang-* ]]; then
            sudo apt-get install -y "clang-${COMPILER#clang-}"
          fi

      - name: Install Intel oneAPI compiler
        if: matrix.compiler == 'intel'
        run: |
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-compiler-dpcpp-cpp

      - name: Install Boost (headers)
        uses: MarkusJx/install-boost@v2.4.5
        id: install-boost
        with:
          boost_version: 1.83.0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Build-time deps for the --no-build-isolation install below. These are NOT
          # pulled in automatically without build isolation:
          #   numpy/scipy  - Cython `cimport numpy` and `from scipy.linalg.cython_blas cimport zgemm`
          #   setuptools-scm - dynamic version lookup
          pip install numpy scipy "setuptools>=77.0.3" setuptools-scm cython build
          # Build mpi4py from source so it links against the mpich installed above.
          pip install --no-binary mpi4py mpi4py pytest pytest-mpi
          if [ "${{ matrix.coverage }}" = "true" ]; then
            pip install pytest-cov
            # Only *collect* per run (no --cov-report): the report is generated once,
            # after combining every run's data. The 2-rank MPI run additionally gives
            # each rank its own COVERAGE_FILE so the two processes don't race to combine
            # into a shared .coverage file (which corrupts it: "table coverage_schema
            # already exists"). See the "Combine coverage" step below.
            echo "PYTEST_COV_ARGS=--cov=src/impurityModel --cov-append --cov-report=" >> "$GITHUB_ENV"
          else
            echo "PYTEST_COV_ARGS=" >> "$GITHUB_ENV"
          fi

      - name: Build and install impurityModel
        run: |
          COMPILER="${{ matrix.compiler }}"
          if [[ "$COMPILER" == gcc-* ]]; then
            export CXX="g++-${COMPILER#gcc-}"
          elif [[ "$COMPILER" == clang-* ]]; then
            export CXX="clang++-${COMPILER#clang-}"
          elif [ "$COMPILER" = "intel" ]; then
            source /opt/intel/oneapi/setvars.sh
            export CXX="icpx"
            # Persist the oneAPI runtime environment so the test steps can load
            # the extension built against the Intel runtime libraries.
            echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
            echo "PATH=$PATH" >> "$GITHUB_ENV"
          fi

          # setup.py adds -std=c++17 only if CXXFLAGS has no -std flag, and reads
          # BOOST_ROOT to locate the Boost headers.
          export CXXFLAGS="${{ matrix.cxx_std }}"
          export BOOST_ROOT="${{ steps.install-boost.outputs.BOOST_ROOT }}"

          # Enable the threaded apply path the way setup.py expects: this adds
          # -DPARALLEL -pthread to BOTH the compile and link steps. Passing
          # -DPARALLEL via CXXFLAGS alone would omit -pthread at link time.
          if [ "${{ matrix.parallel }}" = "true" ]; then
            export IMPURITYMODEL_PARALLEL=1
          fi

          pip install --no-build-isolation -e .

      - name: Run serial tests
        run: |
          pytest --cache-clear $PYTEST_COV_ARGS

      - name: Run MPI tests (1 rank)
        run: |
          mpiexec -n 1 python -m pytest --cache-clear --with-mpi $PYTEST_COV_ARGS

      - name: Run MPI tests (2 ranks)
        run: |
          # Give each rank its own coverage data file so the two processes don't race
          # to combine into a shared .coverage (which crashes rank>0 with exit 3). The
          # rank env var is PMI_RANK under MPICH (the CI MPI) and OMPI_COMM_WORLD_RANK
          # under Open MPI; default 0 keeps this a no-op when coverage is off.
          mpiexec -n 2 bash -c 'COVERAGE_FILE=.coverage.mpi_rank${PMI_RANK:-${OMPI_COMM_WORLD_RANK:-0}} python -m pytest --cache-clear --with-mpi '"$PYTEST_COV_ARGS"

      - name: Run MPI tests (3 ranks)
        run: |
          # A rank can own zero local determinants only once ranks > basis-hash-buckets
          # in play for small fixtures -- i.e. only visible at 3+ ranks, never at 2. This
          # leg is what caught the locked-reort deadlock in _lanczos_step.pxi (empty-rank
          # collectives silently skipped on some ranks but not others).
          mpiexec -n 3 bash -c 'COVERAGE_FILE=.coverage.mpi3_rank${PMI_RANK:-${OMPI_COMM_WORLD_RANK:-0}} python -m pytest --cache-clear --with-mpi '"$PYTEST_COV_ARGS"

      - name: Combine coverage and write XML
        if: matrix.coverage == true
        run: |
          # Merge the serial, 1-rank and per-rank 2-rank data files into one .coverage
          # and emit the authoritative report. Combining here (once) rather than in each
          # run is what keeps the concurrent MPI ranks from corrupting the data file.
          coverage combine
          coverage xml -o coverage.xml
          coverage report

      - name: Upload coverage to Coveralls
        if: matrix.coverage == true
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.xml
          format: cobertura

  docs:
    # Build the Sphinx documentation. autodoc imports the package (only
    # rspt2spectra/pyRSPthon are mocked in conf.py), so this needs the same
    # full build environment as the test jobs: MPI, Boost and the compiled
    # Cython/C++ extension. One default-compiler build is enough here — the
    # matrix above already covers compiler variations.
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history + tags so setuptools-scm can derive the real version
          # instead of falling back to 0.0.0.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mpich libmpich-dev

      - name: Install Boost (headers)
        uses: MarkusJx/install-boost@v2.4.5
        id: install-boost
        with:
          boost_version: 1.83.0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Build-time deps for the --no-build-isolation install below (see the
          # test job for why each is needed).
          pip install numpy scipy "setuptools>=77.0.3" setuptools-scm cython
          # Build mpi4py from source so it links against the mpich installed above.
          pip install --no-binary mpi4py mpi4py

      - name: Build and install impurityModel with doc extras
        run: |
          # Default g++ and -std=c++17 (added by setup.py); BOOST_ROOT locates
          # the Boost headers.
          export BOOST_ROOT="${{ steps.install-boost.outputs.BOOST_ROOT }}"
          pip install --no-build-isolation -e ".[doc]"

      - name: Build HTML documentation
        run: |
          make -s -C doc/sphinx html

      # Only pushes reach this (the workflow's push trigger is master-only);
      # PR runs still build the docs above as a check but don't publish.
      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc/sphinx/generated_doc/html

  deploy-docs:
    # Publish the docs built by the `docs` job to GitHub Pages. Requires the
    # repository's Pages source to be set to "GitHub Actions"
    # (Settings -> Pages -> Build and deployment).
    if: github.event_name == 'push'
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      pages: write      # deploy to Pages
      id-token: write   # verify the deployment originates from this workflow
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
