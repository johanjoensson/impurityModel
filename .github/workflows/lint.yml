name: Lint

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  format:
    name: Check code formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Black
        # Pin the version so a new Black release (which can change the stable
        # formatting style) cannot break CI on otherwise-unchanged code. Bump
        # deliberately, re-running `black src/` when you do.
        run: pip install black==26.5.1
      - name: Run Black
        run: black --check src/
